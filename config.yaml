# Configuration File

inference:
  image_path: "./data/imgs/sample.jpg"
  output_path: "/kaggle/working/inference/output/sample_output.jpg"
  gen_checkpoint: false
  device: "cuda"

# Dataset parameters
dataset:
  root_dir: "/kaggle/working/sentinel12-image-pairs-segregated-by-terrain/v_2"
  split_mode: "random"
  split_ratio: [0.7, 0.15, 0.15]
  seed: 42
  shuffle: true

# Model parameters
model:
  c_in: 3
  c_out: 3
  netD: "patch"
  lambda_L1: 100.0
  is_CGAN: true
  use_upsampling: false
  mode: "nearest"
  c_hid: 64
  n_layers: 3

# Training parameters
training:
  num_epochs: 200
  batch_size: 32
  lr: 0.0002
  beta1: 0.5
  beta2: 0.999
  use_validation: true
  save_freq: 5
  eval_freq: 5
  resume: false
  resume_epoch: 0
  gen_checkpoint: false
  disc_checkpoint: false
  device: "cuda"
  num_workers: 4

# Logging parameters
logging:
  tensorboard:
    enabled: true
    log_dir: "/kaggle/working/runs/tensorboard"
  local:
    base_dir: "/kaggle/working/runs/experiments"